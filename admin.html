<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORDLORD Leaderboard</title>
  <style>
    :root {
      --sidebar-width: 172px;
      --bg: #121213;
      --surface: #1a1a1b;
      --surface-2: #202124;
      --text: #f8f8f8;
      --muted: #d7dadc;
      --border: #3a3a3c;
      --correct: #52c421;
      --present: #b59f3b;
      --danger: #bd4b4b;
      --focus: #85c0f9;
      --input-bg: #0f0f10;
      --header-bg: #151516;
      color-scheme: dark;
    }

    [data-theme="light"] {
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-2: #eceff1;
      --text: #111315;
      --muted: #4d545c;
      --border: #d7dadd;
      --input-bg: #ffffff;
      --header-bg: #ffffff;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      line-height: 1.35;
    }

    body.sidebar-open {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    header {
      background: transparent;
    }

    .header-inner,
    main {
      width: min(560px, calc(100vw - 32px));
      margin: 0 auto;
    }

    .header-inner {
      min-height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 0 12px;
      position: relative;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(42px, 8vw, 70px);
      letter-spacing: 0;
      text-align: center;
    }

    a,
    button {
      color: var(--text);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .button,
    button {
      border: 0;
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 800;
      padding: 10px 12px;
      cursor: pointer;
      text-decoration: none;
    }

    .button.primary,
    button.primary {
      background: var(--correct);
    }

    .icon-button {
      min-width: 48px;
      height: 48px;
      padding: 0;
    }

    .menu-button {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 24;
      border-radius: 14px;
      background: transparent;
    }

    .menu-button:hover {
      background: var(--surface-2);
    }

    .hamburger {
      width: 26px;
      display: grid;
      gap: 6px;
    }

    .hamburger span {
      display: block;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
    }

    .profile-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 24;
    }

    body.sidebar-open .profile-wrap,
    body.sidebar-open .menu-button {
      opacity: 0;
      pointer-events: none;
    }

    .profile-wrap[hidden],
    .profile-menu[hidden],
    .profile-avatar[hidden],
    .profile-initial[hidden],
    .profile-form[hidden] {
      display: none;
    }

    .profile-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0;
    }

    .profile-button:hover,
    .profile-button[aria-expanded="true"] {
      background: var(--correct);
      color: #ffffff;
    }

    .profile-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-initial {
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }

    .profile-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: min(260px, calc(100vw - 28px));
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      padding: 12px;
      display: grid;
      gap: 10px;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.36);
    }

    .profile-name {
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-email,
    .profile-feedback {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin: 0;
    }

    .profile-email {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-form {
      display: grid;
      gap: 7px;
      padding-top: 2px;
    }

    .profile-form label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .profile-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
    }

    .profile-input {
      min-width: 0;
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--input-bg);
      color: var(--text);
      padding: 0 10px;
      font-weight: 800;
    }

    .profile-save,
    .profile-action {
      min-height: 38px;
      border: 0;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 900;
    }

    .profile-save {
      background: var(--surface-2);
      color: var(--text);
      padding: 0 10px;
    }

    .profile-action {
      width: 100%;
      background: var(--correct);
      color: #ffffff;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(0, 0, 0, 0.46);
      z-index: 20;
    }

    body.sidebar-open .sidebar-backdrop {
      display: block;
    }

    .side-nav {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: var(--surface);
      padding: 12px 10px;
      z-index: 22;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transform: translateX(calc(-100% - 1px));
      transition: transform 0.2s ease;
      box-shadow: 16px 0 36px rgba(0, 0, 0, 0.32);
    }

    body.sidebar-open .side-nav {
      transform: translateX(0);
    }

    .side-brand,
    .side-link {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-weight: 900;
      text-align: left;
    }

    .side-brand {
      background: var(--correct);
      padding: 0 10px;
      letter-spacing: 0;
    }

    .mode-links {
      display: grid;
      gap: 8px;
    }

    .side-link {
      background: transparent;
      padding: 0 10px;
    }

    .side-link:hover,
    .side-link.active {
      background: var(--surface-2);
    }

    .side-link.active {
      box-shadow: inset 0 0 0 1px rgba(82, 196, 33, 0.48);
    }

    .theme-toggle {
      position: absolute;
      right: 12px;
      bottom: 14px;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      font-size: 20px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background: var(--correct);
      color: #ffffff;
    }

    main {
      padding: 0 0 40px;
    }

    .status {
      color: var(--muted);
      min-height: 20px;
      margin: 0 0 12px;
      text-align: center;
    }

    .panel-heading,
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-heading {
      padding: 0 0 14px;
      border-bottom: 0;
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .panel-heading h2 {
      margin: 0;
      font-size: 20px;
    }

    .toolbar {
      justify-content: center;
    }

    .toolbar select {
      width: auto;
      min-width: 120px;
      height: 40px;
      padding: 0 34px 0 10px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 10px;
      padding: 16px;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--input-bg);
      color: var(--text);
      padding: 10px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat,
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .stat {
      padding: 14px;
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .panel {
      overflow: visible;
      margin-top: 0;
      padding: 18px;
    }

    .panel > .status {
      padding: 0;
    }

    .panel h2,
    details.panel > summary {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 18px;
    }

    details.panel > summary {
      cursor: pointer;
      font-weight: 900;
      list-style: none;
    }

    details.panel > summary::-webkit-details-marker {
      display: none;
    }

    details.panel > summary::after {
      content: "Open";
      float: right;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    details.panel[open] > summary::after {
      content: "Close";
    }

    .table-wrap {
      overflow: visible;
    }

    table {
      width: 100%;
      min-width: 0;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 0;
      text-align: center;
      vertical-align: middle;
      white-space: normal;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    tbody td {
      background: var(--surface-2);
      font-weight: 900;
    }

    tbody td:first-child {
      width: 86px;
      border-radius: 14px 0 0 14px;
      color: var(--correct);
      font-size: 22px;
    }

    tbody td:last-child {
      border-radius: 0 14px 14px 0;
      font-size: 18px;
    }

    td.answer {
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .pill {
      display: inline-block;
      min-width: 58px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      background: var(--surface-2);
    }

    .pill.win {
      background: var(--correct);
    }

    .pill.loss {
      background: var(--danger);
    }

    .empty {
      padding: 26px 16px;
      color: var(--muted);
      text-align: center;
      border-radius: 14px;
    }

    .leaderboard-more {
      margin: 12px 16px 16px;
    }

    .auth-panel {
      width: min(420px, 100%);
      margin: 40px auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
    }

    .auth-panel h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .auth-panel p {
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 16px;
    }

    .auth-form {
      display: grid;
      gap: 10px;
    }

    .auth-error {
      color: #ffb3b3;
      min-height: 20px;
      margin: 0;
      font-size: 13px;
    }

    .site-credit {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      padding: 0 0 18px;
      text-align: center;
    }

    @media (max-width: 760px) {
      .header-inner {
        min-height: 104px;
        padding: 26px 0 10px;
      }

      .filters,
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .panel-heading {
        align-items: center;
      }

      h1 {
        font-size: 40px;
      }

      .side-nav {
        width: min(196px, 72vw);
      }

      .profile-wrap {
        top: 12px;
        right: 12px;
      }

      .menu-button {
        top: 12px;
        left: 12px;
      }

      .toolbar {
        width: 100%;
      }

      .toolbar select,
      .toolbar button {
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <aside class="side-nav" aria-label="Game modes">
    <button id="homeButton" class="side-brand" type="button">LORDGAMES</button>
    <nav class="mode-links" aria-label="Game modes">
      <button id="sideDailyButton" class="side-link" type="button">Daily</button>
      <button id="sideCasualButton" class="side-link" type="button">Casual</button>
      <button id="sideCluelessButton" class="side-link" type="button">Cluelord</button>
      <button id="sideLeaderboardButton" class="side-link active" type="button">Leaderboard</button>
    </nav>
    <button id="themeButton" class="theme-toggle" type="button" title="Theme" aria-label="Toggle light or dark mode">&#9790;</button>
  </aside>
  <div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <button id="menuButton" class="icon-button menu-button" type="button" title="Menu" aria-label="Open game menu" aria-expanded="false">
        <span class="hamburger" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <h1>Leaderboard</h1>
    </div>
  </header>

  <div id="profileWrap" class="profile-wrap" hidden>
    <button id="profileButton" class="profile-button" type="button" title="Account" aria-label="Account" aria-expanded="false">
      <img id="profileAvatar" class="profile-avatar" alt="" hidden />
      <span id="profileInitial" class="profile-initial" aria-hidden="true">?</span>
    </button>
    <div id="profileMenu" class="profile-menu" role="menu" hidden>
      <div>
        <div id="profileName" class="profile-name">Guest</div>
        <div id="profileEmail" class="profile-email">Sign in to set a username</div>
      </div>
      <form id="profileUsernameForm" class="profile-form" hidden>
        <label for="profileUsernameInput">Username</label>
        <div class="profile-row">
          <input id="profileUsernameInput" class="profile-input" type="text" maxlength="24" autocomplete="nickname" />
          <button id="profileUsernameSave" class="profile-save" type="submit">Save</button>
        </div>
        <p id="profileFeedback" class="profile-feedback"></p>
      </form>
      <button id="profileActionButton" class="profile-action" type="button">Sign in with Google</button>
    </div>
  </div>

  <main>
    <section id="publicLeaderboard" class="panel">
      <div class="panel-heading">
        <h2>Top Players</h2>
        <div class="toolbar">
          <select id="publicLimitFilter" aria-label="Leaderboard size">
            <option value="10">Top 10</option>
            <option value="25">Top 25</option>
            <option value="50">Top 50</option>
          </select>
          <button id="publicRefreshButton" type="button">Refresh</button>
        </div>
      </div>
      <p id="publicLeaderboardStatus" class="status">Loading leaderboard...</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Name</th>
            </tr>
          </thead>
          <tbody id="publicLeaderboardBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="site-credit">made by lordGami</footer>

  <script src="supabase-config.js?v=20260512-2"></script>
  <script src="shared-history.js?v=20260512-3"></script>
  <script>
    "use strict";

    const localHistoryKey = "wordle-clone:local-history";
    const themeKey = "wordle-clone:theme";
    const dayMs = 86400000;
    const baseDay = Date.UTC(2024, 0, 1);
    const answers = [
      "crane", "slate", "flame", "grape", "stone", "brink", "chair", "plant", "smile", "pride",
      "cloud", "sword", "drink", "ghost", "light", "train", "crown", "beast", "magic", "dream",
      "water", "green", "black", "white", "tiger", "eagle", "zebra", "mango", "peach", "berry",
      "cider", "bloom", "raven", "amber", "glory", "frost", "sugar", "ocean", "river", "field",
      "honey", "spark", "orbit", "piano", "maple", "brave", "fresh", "quiet", "sound", "blush",
      "linen", "vivid", "lucky", "harsh", "noble", "wheat", "laser", "coral", "feast", "giant",
      "shard", "shelf", "cabin", "flint", "spice", "globe", "march", "rally", "swirl", "vapor",
      "trace", "knock", "drift", "pilot", "charm", "brass", "stark", "creek", "medal", "olive",
      "toast", "blaze", "fairy", "grace", "movie", "score", "court", "prime", "novel", "slope",
      "proud", "sweep", "level", "meter", "daisy", "hatch", "spoon", "vital", "lemon", "candy",
      "fable", "cargo", "donut", "logic", "north", "south", "cable", "urban", "ranch", "index",
      "quest", "hinge", "union", "siren", "adore", "clean", "creep", "delta", "evoke", "flora"
    ];
    const statusEl = document.getElementById("status");
    const authPanel = document.getElementById("authPanel");
    const dashboard = document.getElementById("dashboard");
    const authForm = document.getElementById("authForm");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginButton = document.getElementById("loginButton");
    const authError = document.getElementById("authError");
    const homeButton = document.getElementById("homeButton");
    const sideDailyButton = document.getElementById("sideDailyButton");
    const sideCasualButton = document.getElementById("sideCasualButton");
    const sideCluelessButton = document.getElementById("sideCluelessButton");
    const sideLeaderboardButton = document.getElementById("sideLeaderboardButton");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");
    const menuButton = document.getElementById("menuButton");
    const publicLeaderboardStatus = document.getElementById("publicLeaderboardStatus");
    const publicLeaderboardBody = document.getElementById("publicLeaderboardBody");
    const publicLimitFilter = document.getElementById("publicLimitFilter");
    const publicRefreshButton = document.getElementById("publicRefreshButton");
    const profileWrap = document.getElementById("profileWrap");
    const profileButton = document.getElementById("profileButton");
    const profileAvatar = document.getElementById("profileAvatar");
    const profileInitial = document.getElementById("profileInitial");
    const profileMenu = document.getElementById("profileMenu");
    const profileName = document.getElementById("profileName");
    const profileEmail = document.getElementById("profileEmail");
    const profileActionButton = document.getElementById("profileActionButton");
    const profileUsernameForm = document.getElementById("profileUsernameForm");
    const profileUsernameInput = document.getElementById("profileUsernameInput");
    const profileFeedback = document.getElementById("profileFeedback");
    const statsGrid = document.getElementById("statsGrid");
    const leaderboardBody = document.getElementById("leaderboardBody");
    const leaderboardMoreButton = document.getElementById("leaderboardMoreButton");
    const puzzleBody = document.getElementById("puzzleBody");
    const historyBody = document.getElementById("historyBody");
    const themeButton = document.getElementById("themeButton");
    const refreshButton = document.getElementById("refreshButton");
    const signOutButton = document.getElementById("signOutButton");
    const typeFilter = document.getElementById("typeFilter");
    const resultFilter = document.getElementById("resultFilter");
    const playerFilter = document.getElementById("playerFilter");
    const sortFilter = document.getElementById("sortFilter");
    const dateFilter = document.getElementById("dateFilter");
    const searchFilter = document.getElementById("searchFilter");

    let attempts = [];
    let leaderboardExpanded = false;
    let activePlayerSession = null;

    initTheme();
    initAccountSystem();
    loadPublicLeaderboard();
    menuButton.addEventListener("click", toggleSidebar);
    sidebarBackdrop.addEventListener("click", closeSidebar);
    homeButton.addEventListener("click", () => {
      closeSidebar();
      window.location.href = "index.html";
    });
    sideDailyButton.addEventListener("click", () => openWordlordMode("daily"));
    sideCasualButton.addEventListener("click", () => openWordlordMode("casual"));
    sideCluelessButton.addEventListener("click", () => {
      closeSidebar();
      window.location.href = "clueless.html";
    });
    sideLeaderboardButton.addEventListener("click", closeSidebar);
    themeButton.addEventListener("click", toggleTheme);
    publicLimitFilter.addEventListener("change", loadPublicLeaderboard);
    publicRefreshButton.addEventListener("click", loadPublicLeaderboard);
    profileButton.addEventListener("click", async (event) => {
      event.stopPropagation();
      await refreshAccountSession();
      toggleProfileMenu();
    });
    profileActionButton.addEventListener("click", () => {
      if (activePlayerSession) {
        signOutAccount();
      } else {
        startGoogleSignIn();
      }
    });
    profileUsernameForm.addEventListener("submit", saveProfileUsername);
    document.addEventListener("click", (event) => {
      if (!profileWrap.contains(event.target)) {
        closeProfileMenu();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeSidebar();
        closeProfileMenu();
      }
    });

    function initTheme() {
      const savedTheme = localStorage.getItem(themeKey);
      const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      setTheme(savedTheme || (prefersLight ? "light" : "dark"));
    }

    function setTheme(theme) {
      const nextTheme = theme === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = nextTheme;
      themeButton.textContent = nextTheme === "light" ? "\u2600" : "\u263e";
      themeButton.title = nextTheme === "light" ? "Switch to dark mode" : "Switch to light mode";
    }

    function toggleTheme() {
      const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";
      localStorage.setItem(themeKey, nextTheme);
      setTheme(nextTheme);
    }

    function toggleSidebar() {
      const shouldOpen = !document.body.classList.contains("sidebar-open");
      document.body.classList.toggle("sidebar-open", shouldOpen);
      if (shouldOpen) closeProfileMenu();
      menuButton.setAttribute("aria-expanded", String(shouldOpen));
      menuButton.setAttribute("aria-label", shouldOpen ? "Close game menu" : "Open game menu");
    }

    function closeSidebar() {
      document.body.classList.remove("sidebar-open");
      menuButton.setAttribute("aria-expanded", "false");
      menuButton.setAttribute("aria-label", "Open game menu");
    }

    function openWordlordMode(mode) {
      closeSidebar();
      const url = new URL("index.html", window.location.href);
      url.searchParams.set("mode", mode);
      window.location.href = url.toString();
    }

    async function initAccountSystem() {
      if (!window.WordleBackend || !window.WordleBackend.isEnabled() || typeof window.WordleBackend.initPlayerAuth !== "function") {
        profileWrap.hidden = true;
        return;
      }

      profileWrap.hidden = false;
      try {
        const session = await window.WordleBackend.initPlayerAuth();
        updateAccountUi(session);
      } catch (error) {
        console.warn("Account sign-in failed.", error);
        updateAccountUi(null);
      }
    }

    async function refreshAccountSession() {
      if (!window.WordleBackend || !window.WordleBackend.isEnabled()) {
        updateAccountUi(null);
        return null;
      }

      const session = await window.WordleBackend.getValidPlayerSession();
      updateAccountUi(session);
      return session;
    }

    function updateAccountUi(session) {
      if (!window.WordleBackend || !window.WordleBackend.isEnabled()) return;
      activePlayerSession = session;

      const displayName = session ? window.WordleBackend.getPlayerDisplayName(session) : "Guest";
      const email = session && session.user && session.user.email ? session.user.email : "";
      const avatarUrl = session && window.WordleBackend.getPlayerAvatarUrl
        ? window.WordleBackend.getPlayerAvatarUrl(session)
        : "";

      profileName.textContent = displayName;
      profileEmail.textContent = email || (session ? "Signed in" : "Sign in to set a username");
      profileActionButton.textContent = session ? "Sign Out" : "Sign in with Google";
      profileButton.title = session ? displayName : "Account";
      profileButton.setAttribute("aria-label", session ? `Account: ${displayName}` : "Account");
      profileUsernameForm.hidden = !session;
      profileUsernameInput.value = session ? displayName : "";
      profileFeedback.textContent = "";

      if (avatarUrl) {
        profileAvatar.src = avatarUrl;
        profileAvatar.hidden = false;
        profileInitial.hidden = true;
      } else {
        profileAvatar.removeAttribute("src");
        profileAvatar.hidden = true;
        profileInitial.hidden = false;
        profileInitial.textContent = session ? displayName.trim().charAt(0).toUpperCase() || "P" : "?";
      }
    }

    async function startGoogleSignIn() {
      closeProfileMenu();

      if (!window.WordleBackend || !window.WordleBackend.isEnabled()) {
        profileFeedback.textContent = "Sign in unavailable.";
        return;
      }

      try {
        await window.WordleBackend.startGoogleSignIn();
      } catch (error) {
        console.warn("Google sign-in failed.", error);
        profileFeedback.textContent = "Sign in failed.";
      }
    }

    async function saveProfileUsername(event) {
      event.preventDefault();

      if (!window.WordleBackend || !window.WordleBackend.isEnabled() || !activePlayerSession) {
        profileFeedback.textContent = "Sign in first.";
        return;
      }

      if (typeof window.WordleBackend.updatePlayerUsername !== "function") {
        profileFeedback.textContent = "Refresh the page and try again.";
        return;
      }

      const username = profileUsernameInput.value.trim().replace(/\s+/g, " ");
      profileUsernameInput.value = username;

      try {
        await window.WordleBackend.updatePlayerUsername(username);
        const session = await refreshAccountSession();
        activePlayerSession = session;
        profileFeedback.textContent = "Saved.";
        loadPublicLeaderboard();
      } catch (error) {
        profileFeedback.textContent = error.message || "Could not save.";
      }
    }

    async function signOutAccount() {
      if (window.WordleBackend && window.WordleBackend.isEnabled()) {
        await window.WordleBackend.signOutPlayer();
      }

      updateAccountUi(null);
      closeProfileMenu();
    }

    function toggleProfileMenu(forceOpen) {
      if (profileWrap.hidden) return;
      const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : profileMenu.hidden;
      profileMenu.hidden = !shouldOpen;
      profileButton.setAttribute("aria-expanded", String(shouldOpen));
    }

    function closeProfileMenu() {
      profileMenu.hidden = true;
      profileButton.setAttribute("aria-expanded", "false");
    }

    async function loadPublicLeaderboard() {
      publicLeaderboardStatus.textContent = "Loading leaderboard...";
      publicLeaderboardBody.innerHTML = `<tr><td class="empty" colspan="2">Loading...</td></tr>`;

      if (!window.WordleBackend || !window.WordleBackend.isEnabled() || typeof window.WordleBackend.fetchPublicLeaderboard !== "function") {
        publicLeaderboardStatus.textContent = "Leaderboard is not ready yet.";
        publicLeaderboardBody.innerHTML = `<tr><td class="empty" colspan="2">No leaderboard yet.</td></tr>`;
        return;
      }

      try {
        const rows = await window.WordleBackend.fetchPublicLeaderboard(Number(publicLimitFilter.value));
        renderPublicLeaderboard(rows);
        publicLeaderboardStatus.textContent = rows.length
          ? ""
          : "No signed-in plays yet.";
      } catch (error) {
        console.warn("Unable to load public leaderboard.", error);
        publicLeaderboardStatus.textContent = "Leaderboard is not ready yet.";
        publicLeaderboardBody.innerHTML = `<tr><td class="empty" colspan="2">Try again in a bit.</td></tr>`;
      }
    }

    function renderPublicLeaderboard(rows) {
      publicLeaderboardBody.innerHTML = "";

      if (!rows.length) {
        publicLeaderboardBody.innerHTML = `<tr><td class="empty" colspan="2">Sign in and play to join the leaderboard.</td></tr>`;
        return;
      }

      rows.forEach((row, index) => {
        const tableRow = document.createElement("tr");
        tableRow.innerHTML = `
          <td>${row.rank || index + 1}</td>
          <td>${escapeHtml(row.username || "Player")}</td>
        `;
        publicLeaderboardBody.appendChild(tableRow);
      });
    }

    async function initAuth() {
      if (!window.WordleBackend || !window.WordleBackend.isEnabled()) {
        showLogin("Leaderboard is not ready.");
        return;
      }

      const session = await window.WordleBackend.getValidAdminSession();
      if (session) {
        showDashboard();
        loadHistory();
      } else {
        showLogin("");
      }
    }

    function showLogin(message) {
      dashboard.hidden = true;
      signOutButton.hidden = true;
      refreshButton.hidden = true;
      authPanel.hidden = false;
      authError.textContent = message || "";
    }

    function showDashboard() {
      authPanel.hidden = true;
      dashboard.hidden = false;
      signOutButton.hidden = false;
      refreshButton.hidden = false;
      authError.textContent = "";
    }

    async function signIn(event) {
      event.preventDefault();
      authError.textContent = "";
      loginButton.disabled = true;
      loginButton.textContent = "Signing in...";

      try {
        await window.WordleBackend.signInAdmin(emailInput.value.trim(), passwordInput.value);
        passwordInput.value = "";
        showDashboard();
        loadHistory();
      } catch (error) {
        authError.textContent = "Could not sign in. Check the email and password.";
        console.warn("Admin sign-in failed.", error);
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = "Sign In";
      }
    }

    function signOut() {
      window.WordleBackend.signOutAdmin();
      attempts = [];
      showLogin("");
    }

    async function loadHistory() {
      statusEl.textContent = "Loading history...";

      let remoteAttempts = [];

      if (window.WordleBackend && window.WordleBackend.isEnabled()) {
        try {
          remoteAttempts = await window.WordleBackend.fetchAttempts(2000);
          statusEl.textContent = `Loaded ${remoteAttempts.length} plays.`;
        } catch (error) {
          console.warn("Unable to load plays.", error);
          statusEl.textContent = `Could not load plays: ${error.message}`;
          if (String(error.message).includes("Please sign in") || String(error.message).includes("JWT")) {
            showLogin("Please sign in again.");
            return;
          }
        }
      } else {
        statusEl.textContent = "Leaderboard is not ready yet.";
      }

      attempts = mergeAttempts(remoteAttempts, []).map(normalizeAttempt);
      populatePlayerFilter();
      render();
    }

    function getLocalAttempts() {
      try {
        const saved = JSON.parse(localStorage.getItem(localHistoryKey));
        return Array.isArray(saved) ? saved : [];
      } catch (error) {
        return [];
      }
    }

    function mergeAttempts(remoteAttempts, localAttempts) {
      const seen = new Set();
      const merged = [];

      [...remoteAttempts, ...localAttempts].forEach((attempt) => {
        const key = attempt.id || `${attempt.created_at}|${attempt.puzzle_key}|${attempt.player_id || ""}`;
        if (seen.has(key)) return;
        seen.add(key);
        merged.push(attempt);
      });

      return merged;
    }

    function normalizeAttempt(attempt) {
      return {
        ...attempt,
        puzzle_kind: attempt.puzzle_kind || "daily",
        puzzle_label: attempt.puzzle_label || attempt.puzzle_key || "Unknown",
        answer: attempt.answer || "",
        won: Boolean(attempt.won),
        guesses_used: Number(attempt.guesses_used) || 0,
        created_at: attempt.created_at || new Date().toISOString(),
        player_label: getPlayerLabel(attempt)
      };
    }

    function getPlayerLabel(attempt) {
      if (attempt.player_name) return attempt.player_name;
      if (attempt.player_email) return attempt.player_email;
      if (attempt.user_id) return "Signed-in player";
      if (attempt.player_id) return `Guest ${String(attempt.player_id).slice(0, 5)}`;
      return "Guest";
    }

    function getPlayerIdentity(attempt) {
      return attempt.user_id
        || attempt.player_email
        || attempt.player_id
        || attempt.player_label
        || "guest";
    }

    function getFilteredAttempts() {
      const type = typeFilter.value;
      const result = resultFilter.value;
      const player = playerFilter.value;
      const date = dateFilter.value;
      const search = searchFilter.value.trim().toLowerCase();

      return attempts.filter((attempt) => {
        if (type !== "all" && attempt.puzzle_kind !== type) return false;
        if (result === "won" && !attempt.won) return false;
        if (result === "lost" && attempt.won) return false;
        if (player !== "all" && getPlayerIdentity(attempt) !== player) return false;
        if (date && toDateInputValue(attempt.created_at) !== date) return false;
        if (search) {
          const haystack = `${attempt.puzzle_label} ${attempt.answer} ${attempt.puzzle_key} ${attempt.player_label}`.toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });
    }

    function render() {
      const filtered = sortAttempts(getFilteredAttempts());
      renderStats(filtered);
      renderLeaderboard(filtered);
      renderPuzzleTable(filtered);
      renderHistoryTable(filtered);
    }

    function sortAttempts(rows) {
      const sorted = [...rows];
      if (sortFilter.value === "oldest") {
        return sorted.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      }
      if (sortFilter.value === "tries") {
        return sorted.sort((a, b) => {
          const aTries = a.won ? a.guesses_used : 99;
          const bTries = b.won ? b.guesses_used : 99;
          return aTries - bTries || new Date(b.created_at) - new Date(a.created_at);
        });
      }
      if (sortFilter.value === "player") {
        return sorted.sort((a, b) => a.player_label.localeCompare(b.player_label) || new Date(b.created_at) - new Date(a.created_at));
      }
      return sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }

    function populatePlayerFilter() {
      const current = playerFilter.value;
      const players = new Map();

      attempts.forEach((attempt) => {
        players.set(getPlayerIdentity(attempt), attempt.player_label);
      });

      playerFilter.innerHTML = `<option value="all">All players</option>`;
      [...players.entries()]
        .sort((a, b) => a[1].localeCompare(b[1]))
        .forEach(([value, label]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = label;
          playerFilter.appendChild(option);
        });

      if ([...playerFilter.options].some((option) => option.value === current)) {
        playerFilter.value = current;
      }
    }

    function renderStats(rows) {
      const wins = rows.filter((attempt) => attempt.won).length;
      const daily = rows.filter((attempt) => attempt.puzzle_kind === "daily").length;
      const casual = rows.filter((attempt) => attempt.puzzle_kind === "casual").length;
      const custom = rows.filter((attempt) => attempt.puzzle_kind === "custom").length;
      const avg = wins ? average(rows.filter((attempt) => attempt.won).map((attempt) => attempt.guesses_used)) : 0;
      const dailyInfo = getDailyInfo();

      statsGrid.innerHTML = "";
      [
        [dailyInfo.label, dailyInfo.answer.toUpperCase()],
        ["Total Plays", rows.length],
        ["Wins", wins],
        ["Win %", rows.length ? `${Math.round((wins / rows.length) * 100)}%` : "0%"],
        ["Avg Tries", avg ? avg.toFixed(1) : "-"],
        ["Daily / Casual / Custom", `${daily} / ${casual} / ${custom}`]
      ].forEach(([label, value]) => {
        const stat = document.createElement("div");
        stat.className = "stat";
        stat.innerHTML = `<strong>${value}</strong><span>${label}</span>`;
        statsGrid.appendChild(stat);
      });
    }

    function getDailyInfo() {
      const puzzleId = getDailyPuzzleId();
      return {
        answer: answers[positiveModulo(puzzleId, answers.length)],
        label: dateFilter.value ? `Daily #${puzzleId}` : `Today #${puzzleId}`
      };
    }

    function getDailyPuzzleId() {
      if (!dateFilter.value) {
        return Math.floor((Date.now() - baseDay) / dayMs);
      }

      const parts = dateFilter.value.split("-").map(Number);
      const selectedDay = Date.UTC(parts[0], parts[1] - 1, parts[2]);
      return Math.floor((selectedDay - baseDay) / dayMs);
    }

    function positiveModulo(value, size) {
      return ((value % size) + size) % size;
    }

    function renderLeaderboard(rows) {
      const groups = new Map();

      rows.forEach((attempt) => {
        const key = getPlayerIdentity(attempt);
        const group = groups.get(key) || {
          player: attempt.player_label,
          plays: 0,
          wins: 0,
          tries: [],
          lastPlayed: attempt.created_at
        };

        if (attempt.player_label && attempt.player_label !== "Guest") {
          group.player = attempt.player_label;
        }
        group.plays += 1;
        if (attempt.won) {
          group.wins += 1;
          group.tries.push(attempt.guesses_used);
        }
        if (new Date(attempt.created_at) > new Date(group.lastPlayed)) {
          group.lastPlayed = attempt.created_at;
        }
        groups.set(key, group);
      });

      const leaderboard = [...groups.values()].sort((a, b) => {
        const winDiff = b.wins - a.wins;
        if (winDiff) return winDiff;
        const rateDiff = (b.wins / Math.max(1, b.plays)) - (a.wins / Math.max(1, a.plays));
        if (rateDiff) return rateDiff;
        const aAvg = a.tries.length ? average(a.tries) : 99;
        const bAvg = b.tries.length ? average(b.tries) : 99;
        return aAvg - bAvg;
      });

      const visibleRows = leaderboardExpanded ? leaderboard : leaderboard.slice(0, 10);
      leaderboardBody.innerHTML = "";
      leaderboardMoreButton.hidden = leaderboard.length <= 10;
      leaderboardMoreButton.textContent = leaderboardExpanded ? "Show Less" : "See More";

      if (!visibleRows.length) {
        leaderboardBody.innerHTML = `<tr><td class="empty" colspan="6">No players match these filters.</td></tr>`;
        return;
      }

      visibleRows.forEach((group, index) => {
        const winRate = group.plays ? Math.round((group.wins / group.plays) * 100) : 0;
        const avgTries = group.tries.length ? average(group.tries).toFixed(1) : "-";
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${escapeHtml(group.player)}</td>
          <td>${group.plays}</td>
          <td>${group.wins}</td>
          <td>${winRate}%</td>
          <td>${avgTries}</td>
        `;
        leaderboardBody.appendChild(row);
      });
    }

    function renderPuzzleTable(rows) {
      const groups = new Map();

      rows.forEach((attempt) => {
        const key = attempt.puzzle_key || attempt.puzzle_label;
        const group = groups.get(key) || {
          label: attempt.puzzle_label,
          kind: attempt.puzzle_kind,
          answer: attempt.answer,
          plays: 0,
          wins: 0,
          tries: [],
          lastPlayed: attempt.created_at
        };

        group.plays += 1;
        if (attempt.won) {
          group.wins += 1;
          group.tries.push(attempt.guesses_used);
        }
        if (new Date(attempt.created_at) > new Date(group.lastPlayed)) {
          group.lastPlayed = attempt.created_at;
        }
        groups.set(key, group);
      });

      const groupRows = [...groups.values()].sort((a, b) => new Date(b.lastPlayed) - new Date(a.lastPlayed));
      puzzleBody.innerHTML = "";

      if (!groupRows.length) {
        puzzleBody.innerHTML = `<tr><td class="empty" colspan="7">No plays match these filters.</td></tr>`;
        return;
      }

      groupRows.forEach((group) => {
        const row = document.createElement("tr");
        const winRate = group.plays ? Math.round((group.wins / group.plays) * 100) : 0;
        const avgTries = group.tries.length ? average(group.tries).toFixed(1) : "-";
        row.innerHTML = `
          <td>${escapeHtml(group.label)}</td>
          <td>${escapeHtml(group.kind)}</td>
          <td class="answer">${escapeHtml(group.answer)}</td>
          <td>${group.plays}</td>
          <td>${winRate}%</td>
          <td>${avgTries}</td>
          <td>${formatDateTime(group.lastPlayed)}</td>
        `;
        puzzleBody.appendChild(row);
      });
    }

    function renderHistoryTable(rows) {
      historyBody.innerHTML = "";

      if (!rows.length) {
        historyBody.innerHTML = `<tr><td class="empty" colspan="7">No plays match these filters.</td></tr>`;
        return;
      }

      rows.forEach((attempt) => {
        const row = document.createElement("tr");
        const resultClass = attempt.won ? "win" : "loss";
        const resultLabel = attempt.won ? "Won" : "Lost";
        row.innerHTML = `
          <td>${formatDateTime(attempt.created_at)}</td>
          <td>${escapeHtml(attempt.player_label)}</td>
          <td>${escapeHtml(attempt.puzzle_label)}</td>
          <td>${escapeHtml(attempt.puzzle_kind)}</td>
          <td class="answer">${escapeHtml(attempt.answer)}</td>
          <td><span class="pill ${resultClass}">${resultLabel}</span></td>
          <td>${attempt.won ? attempt.guesses_used : "X"}/6</td>
        `;
        historyBody.appendChild(row);
      });
    }

    function average(values) {
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function formatDateTime(value) {
      return new Date(value).toLocaleString([], {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function toDateInputValue(value) {
      const date = new Date(value);
      const offset = date.getTimezoneOffset();
      const local = new Date(date.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
